<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITXH-VIP Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            border-bottom: 2px solid #ff3333;
        }
        
        h1 { color: #ff3333; font-size: 32px; margin-bottom: 5px; }
        .sub { color: #888; font-size: 12px; }
        
        .panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #333;
        }
        
        .card h3 {
            color: #ff6666;
            margin-bottom: 15px;
            border-left: 3px solid #ff3333;
            padding-left: 10px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            color: #0f0;
            font-family: monospace;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #ff3333, #cc0000);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            width: 100%;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }
        
        .device-list {
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .device-item {
            background: #0a0a0a;
            padding: 12px;
            margin: 8px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 12px;
            border-left: 3px solid #ff3333;
        }
        
        .device-id {
            color: #0f0;
            word-break: break-all;
            flex: 1;
        }
        
        .delete-btn {
            background: #333;
            color: #ff6666;
            padding: 5px 15px;
            font-size: 11px;
            width: auto;
            margin-left: 10px;
        }
        
        .delete-btn:hover { background: #ff3333; color: white; }
        
        .code-result {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
        
        .code-result.show { display: block; animation: fadeIn 0.3s; }
        
        .activation-code {
            font-size: 24px;
            font-weight: bold;
            color: #0f0;
            letter-spacing: 2px;
            word-break: break-all;
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: none;
        }
        
        .status.success {
            background: rgba(0,255,0,0.1);
            border: 1px solid #0f0;
            color: #0f0;
            display: block;
        }
        
        .status.error {
            background: rgba(255,0,0,0.1);
            border: 1px solid #ff3333;
            color: #ff6666;
            display: block;
        }
        
        .copy-btn {
            background: #333;
            margin-top: 10px;
            width: auto;
            padding: 8px 20px;
        }
        
        .refresh-btn {
            background: #333;
            margin-bottom: 15px;
            width: auto;
            padding: 8px 20px;
        }
        
        .stats {
            color: #888;
            margin-bottom: 15px;
            font-size: 12px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            .panel { grid-template-columns: 1fr; }
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 GLITXH-VIP ADMIN PANEL</h1>
            <div class="sub">Device Management System | Auto-sync with GitHub</div>
        </div>
        
        <div class="panel">
            <div class="card">
                <h3>🔓 GENERATE ACTIVATION CODE</h3>
                <input type="text" id="genDeviceId" placeholder="Masukkan Device ID user">
                <button onclick="generateCode()">⚡ GENERATE KODE</button>
                <div id="codeResult" class="code-result">
                    <div style="color:#ff6666; margin-bottom:10px;">✓ KODE AKTIVASI:</div>
                    <div class="activation-code" id="activationCode"></div>
                    <button class="copy-btn" onclick="copyCode()">📋 COPY KODE</button>
                </div>
            </div>
            
            <div class="card">
                <h3>➕ REGISTER DEVICE BARU</h3>
                <input type="text" id="newDeviceId" placeholder="Device ID yang akan didaftarkan">
                <button onclick="registerDevice()">💾 REGISTER KE GITHUB</button>
                <div class="stats" style="margin-top:10px;">
                    ⚡ Device akan langsung aktif tanpa perlu kode lagi
                </div>
            </div>
        </div>
        
        <div class="device-list">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="color:#ff6666;">📋 REGISTERED DEVICES</h3>
                <button class="refresh-btn" onclick="loadDevices()">🔄 REFRESH</button>
            </div>
            <div id="stats" class="stats"></div>
            <div id="deviceList">
                <div class="loading">Loading devices from GitHub...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/github.js'; // Vercel API endpoint
        
        // Load devices from API
        async function loadDevices() {
            const container = document.getElementById('deviceList');
            const statsDiv = document.getElementById('stats');
            container.innerHTML = '<div class="loading">Loading devices from GitHub...</div>';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (response.ok) {
                    const devices = data.devices || [];
                    displayDevices(devices);
                    statsDiv.innerHTML = `📊 Total devices: ${devices.length} | Last update: ${data.last_updated || 'N/A'}`;
                } else {
                    container.innerHTML = `<div class="loading" style="color:#ff6666;">❌ Error: ${data.error}</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="loading" style="color:#ff6666;">❌ Connection error: ${error.message}</div>`;
            }
        }
        
        function displayDevices(devices) {
            const container = document.getElementById('deviceList');
            
            if (!devices.length) {
                container.innerHTML = '<div class="loading" style="color:#666;">📭 Belum ada device terdaftar</div>';
                return;
            }
            
            container.innerHTML = devices.map(device => `
                <div class="device-item">
                    <span class="device-id">${device}</span>
                    <button class="delete-btn" onclick="deleteDevice('${device}')">🗑️ HAPUS</button>
                </div>
            `).join('');
        }
        
        // Generate activation code
        function generateCode() {
            const deviceId = document.getElementById('genDeviceId').value.trim();
            
            if (!deviceId) {
                showStatus('Masukkan Device ID!', 'error');
                return;
            }
            
            const stringToHash = `vip_${deviceId}_2024`;
            const activationCode = md5(stringToHash).substring(0, 16);
            
            document.getElementById('activationCode').innerHTML = activationCode.toUpperCase();
            document.getElementById('codeResult').classList.add('show');
        }
        
        function copyCode() {
            const code = document.getElementById('activationCode').innerText;
            navigator.clipboard.writeText(code);
            showStatus('✅ Kode berhasil dicopy!', 'success');
            setTimeout(() => hideStatus(), 2000);
        }
        
        // Register device ke GitHub via API
        async function registerDevice() {
            const deviceId = document.getElementById('newDeviceId').value.trim();
            
            if (!deviceId) {
                showStatus('Masukkan Device ID!', 'error');
                return;
            }
            
            showStatus('⏳ Menyimpan ke GitHub...', 'success');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deviceId: deviceId })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showStatus(`✅ Device ${deviceId} berhasil didaftarkan!`, 'success');
                    document.getElementById('newDeviceId').value = '';
                    loadDevices(); // Refresh list
                    setTimeout(() => hideStatus(), 3000);
                } else {
                    showStatus(`❌ Gagal: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        // Delete device dari GitHub
        async function deleteDevice(deviceId) {
            if (!confirm(`Hapus device ${deviceId} dari sistem?`)) return;
            
            showStatus('⏳ Menghapus device...', 'success');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deviceId: deviceId })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showStatus(`✅ Device ${deviceId} berhasil dihapus!`, 'success');
                    loadDevices(); // Refresh list
                    setTimeout(() => hideStatus(), 3000);
                } else {
                    showStatus(`❌ Gagal: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        function showStatus(msg, type) {
            let statusDiv = document.querySelector('.status');
            if (!statusDiv) {
                statusDiv = document.createElement('div');
                statusDiv.className = 'status';
                document.querySelector('.container').insertBefore(statusDiv, document.querySelector('.panel'));
            }
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = msg;
        }
        
        function hideStatus() {
            const statusDiv = document.querySelector('.status');
            if (statusDiv) statusDiv.style.display = 'none';
        }
        
        // MD5 Implementation
        function md5(string) {
            function rotateLeft(lValue, iShiftBits) {
                return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
            }
            
            function addUnsigned(lX, lY) {
                const lX8 = (lX & 0x80000000);
                const lY8 = (lY & 0x80000000);
                const lX4 = (lX & 0x40000000);
                const lY4 = (lY & 0x40000000);
                const lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
                if (lX4 & lY4) return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
                if (lX4 | lY4) {
                    if (lResult & 0x40000000) return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
                    else return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
                } else return (lResult ^ lX8 ^ lY8);
            }
            
            function F(x, y, z) { return (x & y) | ((~x) & z); }
            function G(x, y, z) { return (x & z) | (y & (~z)); }
            function H(x, y, z) { return (x ^ y ^ z); }
            function I(x, y, z) { return (y ^ (x | (~z))); }
            
            function FF(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            
            function GG(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            
            function HH(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            
            function II(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            
            function convertToWordArray(string) {
                const lWordCount = (((string.length + 8) >> 6) + 1) * 16;
                const lWordArray = new Array(lWordCount - 1);
                let lBytePosition = 0;
                let lByteCount = 0;
                while (lByteCount < string.length) {
                    lWordArray[lBytePosition >> 5] |= (string.charCodeAt(lByteCount) & 0xFF) << (lBytePosition % 32);
                    lBytePosition += 8;
                    lByteCount++;
                }
                lWordArray[lBytePosition >> 5] |= 0x80 << (lBytePosition % 32);
                lWordArray[(((lBytePosition + 64) >> 9) << 4) + 14] = string.length * 8;
                return lWordArray;
            }
            
            let x = convertToWordArray(string);
            let a = 0x67452301;
            let b = 0xEFCDAB89;
            let c = 0x98BADCFE;
            let d = 0x10325476;
            
            for (let k = 0; k < x.length; k += 16) {
                const AA = a, BB = b, CC = c, DD = d;
                a = FF(a, b, c, d, x[k+0], 7, 0xD76AA478);
                d = FF(d, a, b, c, x[k+1], 12, 0xE8C7B756);
                c = FF(c, d, a, b, x[k+2], 17, 0x242070DB);
                b = FF(b, c, d, a, x[k+3], 22, 0xC1BDCEEE);
                a = FF(a, b, c, d, x[k+4], 7, 0xF57C0FAF);
                d = FF(d, a, b, c, x[k+5], 12, 0x4787C62A);
                c = FF(c, d, a, b, x[k+6], 17, 0xA8304613);
                b = FF(b, c, d, a, x[k+7], 22, 0xFD469501);
                a = FF(a, b, c, d, x[k+8], 7, 0x698098D8);
                d = FF(d, a, b, c, x[k+9], 12, 0x8B44F7AF);
                c = FF(c, d, a, b, x[k+10], 17, 0xFFFF5BB1);
                b = FF(b, c, d, a, x[k+11], 22, 0x895CD7BE);
                a = FF(a, b, c, d, x[k+12], 7, 0x6B901122);
                d = FF(d, a, b, c, x[k+13], 12, 0xFD987193);
                c = FF(c, d, a, b, x[k+14], 17, 0xA679438E);
                b = FF(b, c, d, a, x[k+15], 22, 0x49B40821);
                a = GG(a, b, c, d, x[k+1], 5, 0xF61E2562);
                d = GG(d, a, b, c, x[k+6], 9, 0xC040B340);
                c = GG(c, d, a, b, x[k+11], 14, 0x265E5A51);
                b = GG(b, c, d, a, x[k+0], 20, 0xE9B6C7AA);
                a = GG(a, b, c, d, x[k+5], 5, 0xD62F105D);
                d = GG(d, a, b, c, x[k+10], 9, 0x02441453);
                c = GG(c, d, a, b, x[k+15], 14, 0xD8A1E681);
                b = GG(b, c, d, a, x[k+4], 20, 0xE7D3FBC8);
                a = GG(a, b, c, d, x[k+9], 5, 0x21E1CDE6);
                d = GG(d, a, b, c, x[k+14], 9, 0xC33707D6);
                c = GG(c, d, a, b, x[k+3], 14, 0xF4D50D87);
                b = GG(b, c, d, a, x[k+8], 20, 0x455A14ED);
                a = GG(a, b, c, d, x[k+13], 5, 0xA9E3E905);
                d = GG(d, a, b, c, x[k+2], 9, 0xFCEFA3F8);
                c = GG(c, d, a, b, x[k+7], 14, 0x676F02D9);
                b = GG(b, c, d, a, x[k+12], 20, 0x8D2A4C8A);
                a = HH(a, b, c, d, x[k+5], 4, 0xFFFA3942);
                d = HH(d, a, b, c, x[k+8], 11, 0x8771F681);
                c = HH(c, d, a, b, x[k+11], 16, 0x6D9D6122);
                b = HH(b, c, d, a, x[k+14], 23, 0xFDE5380C);
                a = HH(a, b, c, d, x[k+1], 4, 0xA4BEEA44);
                d = HH(d, a, b, c, x[k+4], 11, 0x4BDECFA9);
                c = HH(c, d, a, b, x[k+7], 16, 0xF6BB4B60);
                b = HH(b, c, d, a, x[k+10], 23, 0xBEBFBC70);
                a = HH(a, b, c, d, x[k+13], 4, 0x289B7EC6);
                d = HH(d, a, b, c, x[k+0], 11, 0xEAA127FA);
                c = HH(c, d, a, b, x[k+3], 16, 0xD4EF3085);
                b = HH(b, c, d, a, x[k+6], 23, 0x04881D05);
                a = HH(a, b, c, d, x[k+9], 4, 0xD9D4D039);
                d = HH(d, a, b, c, x[k+12], 11, 0xE6DB99E5);
                c = HH(c, d, a, b, x[k+15], 16, 0x1FA27CF8);
                b = HH(b, c, d, a, x[k+2], 23, 0xC4AC5665);
                a = II(a, b, c, d, x[k+0], 6, 0xF4292244);
                d = II(d, a, b, c, x[k+7], 10, 0x432AFF97);
                c = II(c, d, a, b, x[k+14], 15, 0xAB9423A7);
                b = II(b, c, d, a, x[k+5], 21, 0xFC93A039);
                a = II(a, b, c, d, x[k+12], 6, 0x655B59C3);
                d = II(d, a, b, c, x[k+3], 10, 0x8F0CCC92);
                c = II(c, d, a, b, x[k+10], 15, 0xFFEFF47D);
                b = II(b, c, d, a, x[k+1], 21, 0x85845DD1);
                a = II(a, b, c, d, x[k+8], 6, 0x6FA87E4F);
                d = II(d, a, b, c, x[k+15], 10, 0xFE2CE6E0);
                c = II(c, d, a, b, x[k+6], 15, 0xA3014314);
                b = II(b, c, d, a, x[k+13], 21, 0x4E0811A1);
                a = II(a, b, c, d, x[k+4], 6, 0xF7537E82);
                d = II(d, a, b, c, x[k+11], 10, 0xBD3AF235);
                c = II(c, d, a, b, x[k+2], 15, 0x2AD7D2BB);
                b = II(b, c, d, a, x[k+9], 21, 0xEB86D391);
                a = addUnsigned(a, AA);
                b = addUnsigned(b, BB);
                c = addUnsigned(c, CC);
                d = addUnsigned(d, DD);
            }
            
            const wordToHex = (lValue) => {
                let wordToHexValue = "";
                for (let i = 0; i <= 3; i++) {
                    const lByte = (lValue >>> (i * 8)) & 255;
                    wordToHexValue += ("0" + lByte.toString(16)).slice(-2);
                }
                return wordToHexValue;
            };
            
            return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
        }
        
        // Load devices on page load
        loadDevices();
    </script>
</body>
</html>
