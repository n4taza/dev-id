<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uploader Catbox</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:320px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1 {
    margin-bottom:20px;
}

input {
    margin:10px 0;
}

button {
    background:#6366f1;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    background:#4f46e5;
}

.result {
    margin-top:15px;
    word-break:break-all;
}
</style>
</head>
<body>

<div class="container">
    <h1>Upload File</h1>

    <input type="file" id="fileInput"><br>
    <button onclick="upload()">Upload</button>

    <div class="result" id="result"></div>
</div>

<script>
async function upload() {
    const file = document.getElementById("fileInput").files[0];
    const result = document.getElementById("result");

    if (!file) {
        result.innerText = "Pilih file dulu!";
        return;
    }

    result.innerText = "Uploading...";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch("/api/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.url && data.url.startsWith("http")) {
            result.innerHTML = `<a href="${data.url}" target="_blank">${data.url}</a>`;
        } else {
            result.innerText = "Error upload!";
        }

    } catch (err) {
        result.innerText = "Upload gagal!";
        console.error(err);
    }
}
</script>

</body>
</html>
