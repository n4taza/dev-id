<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uploader Catbox</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:#1e293b;
  padding:25px;
  border-radius:10px;
  text-align:center;
}
button {
  margin-top:10px;
  padding:10px;
  background:#6366f1;
  color:white;
  border:none;
  border-radius:6px;
}
</style>
</head>
<body>

<div class="box">
  <h2>Upload File</h2>
  <input type="file" id="file"><br>
  <button onclick="upload()">Upload</button>
  <p id="result"></p>
</div>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];
  const result = document.getElementById("result");

  if (!file) {
    result.innerText = "Pilih file dulu!";
    return;
  }

  result.innerText = "Uploading...";

  const formData = new FormData();
  formData.append("reqtype", "fileupload");
  formData.append("fileToUpload", file);

  try {
    const res = await fetch("https://catbox.moe/user/api.php", {
      method: "POST",
      body: formData
    });

    const text = await res.text();

    if (text.startsWith("http")) {
      result.innerHTML = `<a href="${text}" target="_blank">${text}</a>`;
    } else {
      result.innerText = "Error: " + text;
    }

  } catch (err) {
    result.innerText = "Upload gagal: " + err.message;
  }
}
</script>

</body>
</html>
